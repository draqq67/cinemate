services:

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    networks:
      - web
    depends_on:
      - backend
      - jellyfin
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - /home/dragos/media:/media
    networks:
      - web
      - internal
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env
    networks:
      - internal
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    networks:
      - web
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /home/dragos/media:/media:ro
    restart: unless-stopped

  ml:
    build: ./ml
    env_file: .env
    environment:
      GENOME_PATH: /app/data/genome_vectors.parquet
      MODELS_DIR: /app/models
      MODEL_TTL_HOURS: "24"
      OPENBLAS_NUM_THREADS: "1"
    networks:
      - internal
      - monitoring
    volumes:
      - ./ml/data:/app/data:ro
      - ml_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability stack ─────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - internal
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - '--nginx.scrape-uri=http://nginx:8081/nginx_status'
    networks:
      - web
      - monitoring
    depends_on:
      - nginx
    restart: unless-stopped

networks:
  web:        # nginx ↔ backend ↔ jellyfin
  internal:   # backend ↔ postgres ↔ ml (never reachable from outside)
  monitoring: # prometheus ↔ grafana ↔ exporters ↔ backend/ml /metrics

volumes:
  pg_data:
  jellyfin_config:
  jellyfin_cache:
  ml_models:
  prometheus_data:
  grafana_data: