events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limit zones — keyed per client IP
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=6r/m;

    upstream backend  { server backend:4000; }
    upstream jellyfin { server jellyfin:8096; }

    # Internal-only — not published to the host, scraped by nginx-exporter over the
    # `monitoring` Docker network so Prometheus can collect nginx connection metrics
    server {
        listen 8081;
        server_name localhost;

        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }

    server {
        listen 80;
        server_name localhost;

        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header X-Frame-Options          "DENY"                             always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://image.tmdb.org data: blob:; media-src 'self' blob:; connect-src 'self' ws: wss:; frame-src https://www.youtube.com;"
            always;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Auth — strict rate limit (5 req/min per IP, burst of 5)
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 1m;
        }

        # Video upload — no size limit, but rate-limited to 6/min
        location ~ ^/api/admin/movies/[^/]+/upload-video$ {
            limit_req zone=upload burst=2 nodelay;
            limit_req_status 429;

            proxy_pass              http://backend;
            proxy_http_version      1.1;
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size    0;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            proxy_request_buffering off;
        }

        # General API — 60 req/s per IP, 10 MB body limit
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 10m;
            proxy_read_timeout   60s;
            proxy_send_timeout   60s;
            proxy_request_buffering off;
        }

        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /stream/ {
            proxy_pass         http://jellyfin/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_buffering    off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 0;
        }
    }
}